<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Acid 303 Web Sequencer</title>
<style>
:root{--bg:#05070b;--panel:#0c121b;--panel2:#121a25;--line:#263245;--txt:#f7f9fd;--muted:#a5afbd;--purple:#bd4dff;--green:#baff26;--cyan:#3bdcff;--radius:17px;--shadow:0 18px 55px #000a}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--bg);color:var(--txt);font-family:Inter,system-ui,Segoe UI,Arial,sans-serif;overflow-x:hidden}body{background:radial-gradient(circle at 0 0,#bd4dff1c,transparent 30%),radial-gradient(circle at 95% 10%,#baff2618,transparent 28%),linear-gradient(180deg,#0c121a,#04070b 70%)}button,input,select{font:inherit}.app{width:min(1500px,100%);margin:0 auto;padding:12px}.top{display:grid;grid-template-columns:1.4fr auto auto auto auto;gap:12px;align-items:center;background:linear-gradient(180deg,#111923,#060a0f);border:1px solid #263142;border-radius:var(--radius);padding:12px;box-shadow:var(--shadow)}.brand{font-size:28px;font-weight:950;letter-spacing:-.06em;line-height:1}.brand span{color:var(--green);text-shadow:0 0 22px #baff2680}.sub{margin-top:5px;color:var(--muted);font-size:12px;font-weight:850;letter-spacing:.08em;text-transform:uppercase}.transport{display:flex;gap:8px}.btn{height:44px;border:1px solid #334259;border-radius:12px;background:#0a1018;color:#fff;padding:0 16px;font-weight:950;cursor:pointer}.btn:hover{border-color:var(--cyan)}.btn.play{border-color:#82bd1e;color:var(--green)}.btn.export{border-color:var(--green);color:var(--green);box-shadow:0 0 18px #baff2620}.read{display:flex;align-items:center;gap:8px;border-left:1px solid #202b3c;padding-left:12px}.read label{font-size:11px;font-weight:950;text-transform:uppercase;color:#cfd7e2}.read b{display:grid;place-items:center;min-width:78px;height:36px;border:1px solid #1e2b40;border-radius:9px;background:#06101b;color:var(--cyan);font:950 16px/1 monospace}.knob{width:54px;height:54px;border-radius:50%;appearance:none;background:radial-gradient(circle,#172029 0 40%,#020408 43% 58%,transparent 60%),conic-gradient(from -135deg,var(--accent,var(--green)) calc(var(--val,50)*.75%),#313b45 0 75%,transparent 0);cursor:pointer}.knob::-webkit-slider-thumb{appearance:none;width:1px;height:1px}.knob::-moz-range-thumb{width:1px;height:1px;border:0}.section{margin-top:12px;border-radius:var(--radius);border:1px solid var(--line);background:linear-gradient(160deg,#0d1621,#05080d);box-shadow:var(--shadow);padding:14px}.section.drum{border-color:#8745ad}.section.bass{border-color:#83bd1d}.head{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:12px}.title{display:flex;gap:12px;align-items:center}.icon{width:42px;height:42px;display:grid;place-items:center;border-radius:12px;border:1px solid currentColor;background:#ffffff08;font-size:23px}.drum .title{color:var(--purple)}.bass .title{color:var(--green)}h2{margin:0;font-size:22px;text-transform:uppercase;letter-spacing:-.03em;line-height:1}small{display:block;color:#c9d1db;font-weight:800;margin-top:4px}.gridWrap{display:grid;grid-template-columns:310px 1fr 180px;gap:14px;align-items:start}.tracks{border-right:1px solid #263142;padding-right:10px}.track{display:grid;grid-template-columns:34px 1fr 32px 32px 70px;gap:7px;align-items:center;height:45px;border-bottom:1px solid #1c2635}.track .emoji{font-size:19px}.track b{font-size:14px}.mini{height:30px;border-radius:7px;border:1px solid #303c4d;background:#0b1119;color:#fff;font-weight:900;cursor:pointer}.mini.active{background:#332044;color:var(--purple);border-color:var(--purple)}.vol{width:70px;accent-color:var(--purple)}.steps,.piano{overflow-x:auto;padding-bottom:5px}.stepnums,.rowsteps{display:grid;grid-template-columns:repeat(16,minmax(45px,1fr));gap:6px;min-width:790px}.stepnums div{text-align:center;font-weight:900;color:#e7edf6}.cell{height:39px;border:1px solid #202a38;border-radius:8px;background:linear-gradient(145deg,#252525,#141619);cursor:pointer;box-shadow:inset 0 1px 0 #fff1}.cell.on.purple{background:linear-gradient(160deg,#ce56ff,#8d38e8);box-shadow:0 0 16px #bd4dff80}.cell.on.green,.noteCell.on{background:linear-gradient(160deg,#d5ff36,#84d719);box-shadow:0 0 16px #baff2680}.playing{outline:2px solid var(--cyan)!important}.side{display:grid;gap:10px}.card{border:1px solid #263142;border-radius:12px;background:#091019;padding:11px}.card label{display:block;font-size:12px;font-weight:950;text-transform:uppercase;color:#d6deea;margin-bottom:8px}.value{height:35px;display:grid;place-items:center;border:1px solid #1f2a3a;border-radius:8px;background:#05080d;color:var(--green);font:950 15px monospace}.bassGrid{display:grid;grid-template-columns:370px 1fr 190px;gap:14px}.synth{display:grid;gap:10px}.knobGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.control{text-align:center;border:1px solid #263142;border-radius:12px;background:#080e15;padding:8px}.control label{font-size:10px;font-weight:950;text-transform:uppercase;color:#e2e8f1}.control .knob{width:52px;height:52px;margin:3px auto}.control output{display:block;color:var(--green);font:950 12px monospace}.selects{display:grid;grid-template-columns:1fr 1fr;gap:8px}.selects button,.selects select{height:38px;border:1px solid #719e1c;border-radius:8px;background:#090f13;color:var(--green);font-weight:950}.pianoGrid{display:grid;grid-template-columns:48px repeat(16,minmax(43px,1fr));gap:5px;min-width:760px}.noteLabel{height:31px;display:grid;place-items:center;font-weight:900;color:#dce4ee}.noteCell{height:31px;border:1px solid #202a38;border-radius:6px;background:linear-gradient(145deg,#232722,#121711);cursor:pointer}.accentRow{display:grid;grid-template-columns:48px repeat(16,minmax(43px,1fr));gap:5px;min-width:760px;margin-top:8px}.accentCell{height:26px;display:grid;place-items:center;color:#4b513f;cursor:pointer}.accentCell.on{color:var(--green);text-shadow:0 0 13px #baff26}.octBtns{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}.octBtn{height:31px;border-radius:7px;border:1px solid #303c4d;background:#0b1119;color:#fff;font-weight:950;cursor:pointer}.octBtn.active{border-color:var(--green);color:var(--green);box-shadow:0 0 13px #baff2620}.footer{margin-top:12px;display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;border:1px solid #263142;border-radius:var(--radius);background:#091019;padding:12px;color:#c8d1dc}.preset{height:38px;border:1px solid #2a3545;border-radius:9px;background:#060b10;color:white;padding:0 12px}.mastervol{accent-color:var(--purple)}@media(max-width:1050px){.top{grid-template-columns:1fr 1fr 1fr}.brandbox{grid-column:1/-1}.gridWrap,.bassGrid{grid-template-columns:1fr}.tracks{border-right:0;border-bottom:1px solid #263142;padding-right:0;padding-bottom:10px}.side{grid-template-columns:repeat(3,1fr)}}@media(max-width:680px){.app{padding:8px}.top{grid-template-columns:1fr 1fr}.brandbox{grid-column:1/-1}.brand{font-size:23px}.sub{font-size:10px}.transport{grid-column:1/-1}.btn{height:40px;padding:0 11px}.read{border-left:0;padding-left:0}.read b{min-width:64px}.section{padding:10px}.head{align-items:flex-start;flex-direction:column}h2{font-size:19px}.track{grid-template-columns:28px 1fr 30px 30px 60px}.side{grid-template-columns:1fr}.knobGrid{grid-template-columns:repeat(2,1fr)}.selects{grid-template-columns:1fr}.footer{grid-template-columns:1fr;text-align:center}.stepnums,.rowsteps{min-width:650px;grid-template-columns:repeat(16,39px)}.cell{height:36px}.pianoGrid,.accentRow{min-width:650px;grid-template-columns:42px repeat(16,36px)}}
</style>
</head>
<body>
<div class="app">
<header class="top">
  <div class="brandbox"><div class="brand">ACID <span>303</span> WEB SEQUENCER</div><div class="sub">Drum Machine + Bass Sequencer</div></div>
  <div class="transport"><button class="btn play" id="play">▶ PLAY</button><button class="btn" id="stop">■ STOP</button></div>
  <div class="read"><label>BPM</label><input id="tempo" class="knob" style="--accent:var(--green)" type="range" min="70" max="180" value="128"><b id="tempoVal">128</b></div>
  <div class="read"><label>Swing</label><input id="swing" class="knob" style="--accent:var(--purple)" type="range" min="0" max="60" value="0"><b id="swingVal">0%</b></div>
  <button class="btn export" id="export">EXPORT WAV</button>
</header>
<section class="section drum"><div class="head"><div class="title"><div class="icon">🥁</div><div><h2>Drum Sequencer</h2><small>16 Step Drum Pattern</small></div></div><div><button class="btn" id="randomDrums">RANDOM</button> <button class="btn" id="clearDrums">CLEAR</button></div></div><div class="gridWrap"><div class="tracks" id="drumTracks"></div><div class="steps"><div class="stepnums" id="drumNums"></div><div id="drumRows"></div></div><div class="side"><div class="card"><label>Volume</label><input id="drumVolume" class="knob" style="--accent:var(--purple)" type="range" min="0" max="100" value="85"><div class="value" id="drumVolVal">85%</div></div><div class="card"><label>Accent</label><input id="drumAccent" class="knob" style="--accent:var(--purple)" type="range" min="0" max="100" value="55"><div class="value" id="drumAccVal">55%</div></div><div class="card"><label>Scale</label><div class="value">1/16</div></div></div></div></section>
<section class="section bass"><div class="head"><div class="title"><div class="icon">▦</div><div><h2>Bass Sequencer <span style="font-size:.75em">(303 Style)</span></h2><small>16 Step Bassline</small></div></div><div><button class="btn" id="randomBass">RANDOM</button> <button class="btn" id="clearBass">CLEAR</button></div></div><div class="bassGrid"><div class="synth"><div class="card"><label>Sound</label><div class="knobGrid"><div class="control"><label>Cutoff</label><input id="cutoff" class="knob" type="range" min="100" max="5000" value="850"><output>850 Hz</output></div><div class="control"><label>Resonance</label><input id="resonance" class="knob" type="range" min="1" max="25" value="12"><output>12</output></div><div class="control"><label>Env Mod</label><input id="envmod" class="knob" type="range" min="0" max="100" value="58"><output>58%</output></div><div class="control"><label>Decay</label><input id="decay" class="knob" type="range" min="40" max="800" value="180"><output>180 ms</output></div><div class="control"><label>Volume</label><input id="bassVolume" class="knob" type="range" min="0" max="100" value="82"><output>82%</output></div><div class="control"><label>Distort</label><input id="distort" class="knob" type="range" min="0" max="100" value="18"><output>18%</output></div></div></div><div class="card"><label>TB-303 Style</label><div class="selects"><select id="wave"><option>sawtooth</option><option>square</option></select><button id="slideBtn">SLIDE ON</button></div></div></div><div class="piano"><div class="pianoGrid" id="pianoGrid"></div><div class="accentRow" id="accentRow"></div></div><div class="side"><div class="card"><label>Slide Time</label><input id="slideTime" class="knob" type="range" min="20" max="400" value="120"><div class="value" id="slideVal">120 ms</div></div><div class="card"><label>Gate Length</label><input id="gate" class="knob" type="range" min="20" max="100" value="80"><div class="value" id="gateVal">80%</div></div><div class="card"><label>Octave Shift</label><div class="octBtns" id="octBtns"><button class="octBtn" data-o="-2">-2</button><button class="octBtn" data-o="-1">-1</button><button class="octBtn active" data-o="0">0</button><button class="octBtn" data-o="1">+1</button><button class="octBtn" data-o="2">+2</button></div></div></div></div></section>
<div class="footer"><select class="preset" id="preset"><option>Acid 303</option><option>Minimal</option><option>Electro</option></select><span></span><div>Master <input id="masterVolume" class="mastervol" type="range" min="0" max="100" value="85"></div></div>
</div>
<script>
(()=>{
'use strict';
const $=id=>document.getElementById(id), STEPS=16, AudioCtx=window.AudioContext||window.webkitAudioContext;
let ctx,master,compressor,playing=false,timer=null,step=0,nextTime=0,oct=0,slide=true,lastBassFreq=null;
const ids=['play','stop','export','tempo','tempoVal','swing','swingVal','drumVolume','drumVolVal','drumAccent','drumAccVal','drumNums','drumRows','drumTracks','pianoGrid','accentRow','slideTime','slideVal','gate','gateVal','cutoff','resonance','envmod','decay','bassVolume','distort','wave','slideBtn','clearDrums','randomDrums','clearBass','randomBass','masterVolume','preset','octBtns'];
const el=Object.fromEntries(ids.map(id=>[id,$(id)]));
const drumDefs=[['●','KICK'],['◉','SNARE'],['✦','HI-HAT'],['✋','CLAP'],['◎','RIM'],['✧','OPEN HAT'],['╱','PERC'],['✹','CRASH']];
let drums=drumDefs.map((_,i)=>Array.from({length:STEPS},(_,s)=>(i===0&&[0,4,8,12].includes(s))||(i===1&&[4,12].includes(s))||(i===2&&s%2===0)||(i===3&&[8,12].includes(s))||(i===4&&[3,11].includes(s))||(i===5&&[8,15].includes(s))||(i===6&&[5,13].includes(s))||(i===7&&[9,15].includes(s))));
let drumSolo=Array(8).fill(false),drumMute=Array(8).fill(false),drumVol=Array(8).fill(.9);
const notes=['C5','B4','A4','G4','F4','E4','D4','C4'], semis={C:0,D:2,E:4,F:5,G:7,A:9,B:11};
let bass=[7,6,5,4,3,2,1,0,7,1,5,2,0,null,3,5], accents=Array.from({length:STEPS},(_,i)=>[0,4,8,12].includes(i));
function initAudio(){if(ctx)return;ctx=new AudioCtx();master=ctx.createGain();compressor=ctx.createDynamicsCompressor();compressor.threshold.value=-4;compressor.ratio.value=7;master.connect(compressor);compressor.connect(ctx.destination);master.gain.value=el.masterVolume.value/100;}
function knob(k){let min=+k.min,max=+k.max,v=+k.value;k.style.setProperty('--val',((v-min)/(max-min)*100).toFixed(1));}
function updateLabels(){el.tempoVal.textContent=el.tempo.value;el.swingVal.textContent=el.swing.value+'%';el.drumVolVal.textContent=el.drumVolume.value+'%';el.drumAccVal.textContent=el.drumAccent.value+'%';el.slideVal.textContent=el.slideTime.value+' ms';el.gateVal.textContent=el.gate.value+'%';document.querySelectorAll('.control').forEach(c=>{let input=c.querySelector('input'),out=c.querySelector('output');if(!out)return;let id=input.id,v=input.value;out.textContent=id==='cutoff'?v+' Hz':id==='decay'?v+' ms':id==='resonance'?v:v+'%';});if(master)master.gain.value=el.masterVolume.value/100;}
function buildUI(){for(let i=1;i<=STEPS;i++){let d=document.createElement('div');d.textContent=i;el.drumNums.appendChild(d)}drumDefs.forEach((d,i)=>{let tr=document.createElement('div');tr.className='track';tr.innerHTML=`<span class="emoji">${d[0]}</span><b>${d[1]}</b><button class="mini solo">S</button><button class="mini mute">M</button><input class="vol" type="range" min="0" max="1" step=".01" value=".9">`;el.drumTracks.appendChild(tr);tr.querySelector('.solo').onclick=e=>{drumSolo[i]=!drumSolo[i];e.target.classList.toggle('active',drumSolo[i])};tr.querySelector('.mute').onclick=e=>{drumMute[i]=!drumMute[i];e.target.classList.toggle('active',drumMute[i])};tr.querySelector('.vol').oninput=e=>drumVol[i]=+e.target.value;let row=document.createElement('div');row.className='rowsteps';for(let s=0;s<STEPS;s++){let c=document.createElement('button');c.className='cell purple'+(drums[i][s]?' on':'');c.onclick=()=>{drums[i][s]=!drums[i][s];c.classList.toggle('on',drums[i][s])};row.appendChild(c)}el.drumRows.appendChild(row)});notes.forEach((n,r)=>{let lab=document.createElement('div');lab.className='noteLabel';lab.textContent=n;el.pianoGrid.appendChild(lab);for(let s=0;s<STEPS;s++){let c=document.createElement('button');c.className='noteCell '+(bass[s]===r?'on':'');c.onclick=()=>{bass[s]=bass[s]===r?null:r;drawBass()};el.pianoGrid.appendChild(c)}});let lab=document.createElement('div');lab.className='noteLabel';lab.textContent='ACCENT';el.accentRow.appendChild(lab);for(let s=0;s<STEPS;s++){let a=document.createElement('div');a.className='accentCell '+(accents[s]?'on':'');a.textContent='◆';a.onclick=()=>{accents[s]=!accents[s];a.classList.toggle('on',accents[s])};el.accentRow.appendChild(a)}}
function drawBass(){document.querySelectorAll('.noteCell').forEach((c,i)=>{let r=Math.floor(i/STEPS),s=i%STEPS;c.classList.toggle('on',bass[s]===r)})}
function noiseBuffer(dur){let b=ctx.createBuffer(1,Math.max(1,Math.floor(ctx.sampleRate*dur)),ctx.sampleRate),x=b.getChannelData(0);for(let i=0;i<x.length;i++)x[i]=Math.random()*2-1;return b}
function envGain(t,a,d,vol){let g=ctx.createGain();g.gain.setValueAtTime(.0001,t);g.gain.linearRampToValueAtTime(vol,t+a);g.gain.exponentialRampToValueAtTime(.0001,t+a+d);return g}
function drumAllowed(i){let any=drumSolo.some(Boolean);return !drumMute[i] && (!any || drumSolo[i])}
function playDrum(i,t,accent){if(!drumAllowed(i))return;let bus=ctx.createGain();bus.gain.value=(el.drumVolume.value/100)*drumVol[i]*(accent?1+el.drumAccent.value/130:1);bus.connect(master);if(i===0){let o=ctx.createOscillator(),g=envGain(t,.002,.38,1);o.type='sine';o.frequency.setValueAtTime(150,t);o.frequency.exponentialRampToValueAtTime(45,t+.12);o.connect(g).connect(bus);o.start(t);o.stop(t+.42)}else if(i===1){let n=ctx.createBufferSource(),f=ctx.createBiquadFilter(),g=envGain(t,.002,.18,.9);n.buffer=noiseBuffer(.3);f.type='bandpass';f.frequency.value=1600;f.Q.value=.7;n.connect(f).connect(g).connect(bus);n.start(t);n.stop(t+.32)}else if(i===2||i===5||i===7){let n=ctx.createBufferSource(),f=ctx.createBiquadFilter(),g=envGain(t,.001,i===2?.055:i===5?.28:.55,.8);n.buffer=noiseBuffer(.8);f.type='highpass';f.frequency.value=i===7?5000:8000;n.connect(f).connect(g).connect(bus);n.start(t);n.stop(t+(i===2?.08:i===5?.32:.6))}else{let n=ctx.createBufferSource(),f=ctx.createBiquadFilter(),g=envGain(t,.001,.12,.75);n.buffer=noiseBuffer(.22);f.type='bandpass';f.frequency.value=i===3?1100:i===4?900:2100;f.Q.value=3;n.connect(f).connect(g).connect(bus);n.start(t);n.stop(t+.23)}}
function noteFreq(name){let m=name.match(/([A-G])(\d)/),semi=semis[m[1]],octv=+m[2]+oct;return 440*Math.pow(2,(semi+(octv-4)*12-9)/12)}
function makeDistortion(amount){let n=256,curve=new Float32Array(n),k=amount*2;for(let i=0;i<n;i++){let x=i*2/n-1;curve[i]=(1+k)*x/(1+k*Math.abs(x));}return curve}
function playBass(t,dur,stepIndex){let r=bass[stepIndex];if(r==null)return;let freq=noteFreq(notes[r]);let osc=ctx.createOscillator(),filter=ctx.createBiquadFilter(),amp=ctx.createGain(),dist=ctx.createWaveShaper(),out=ctx.createGain();osc.type=el.wave.value;filter.type='lowpass';filter.Q.value=+el.resonance.value;let cf=+el.cutoff.value, env=+el.envmod.value/100, dec=+el.decay.value/1000, vol=+el.bassVolume.value/100*(accents[stepIndex]?1.25:1);filter.frequency.setValueAtTime(cf,t);filter.frequency.exponentialRampToValueAtTime(Math.min(12000,cf+cf*8*env),t+.018);filter.frequency.exponentialRampToValueAtTime(Math.max(80,cf),t+dec);if(slide && lastBassFreq && bass[(stepIndex+15)%16]!=null){osc.frequency.setValueAtTime(lastBassFreq,t);osc.frequency.exponentialRampToValueAtTime(freq,t+(+el.slideTime.value/1000));}else{osc.frequency.setValueAtTime(freq,t)}lastBassFreq=freq;dist.curve=makeDistortion(+el.distort.value/100);dist.oversample='2x';amp.gain.setValueAtTime(.0001,t);amp.gain.linearRampToValueAtTime(vol,t+.01);amp.gain.exponentialRampToValueAtTime(.0001,t+dur*(+el.gate.value/100));osc.connect(filter).connect(dist).connect(amp).connect(out).connect(master);osc.start(t);osc.stop(t+dur+.03)}
function stepDur(){return 60/+el.tempo.value/4}
function scheduler(){while(nextTime<ctx.currentTime+.12){let t=nextTime;if(step%2===1)t+=(+el.swing.value/100)*stepDur()*.45;playStep(step,t);nextTime+=stepDur();step=(step+1)%STEPS}timer=setTimeout(scheduler,25)}
function playStep(s,t){document.querySelectorAll('.playing').forEach(x=>x.classList.remove('playing'));document.querySelectorAll('.rowsteps').forEach(r=>r.children[s]?.classList.add('playing'));document.querySelectorAll('.noteCell').forEach((c,i)=>{if(i%STEPS===s)c.classList.add('playing')});drums.forEach((row,i)=>{if(row[s])playDrum(i,t,accents[s])});playBass(t,stepDur(),s)}
async function start(){initAudio();await ctx.resume();if(playing)return;playing=true;el.play.textContent='❚❚ PAUSE';nextTime=ctx.currentTime+.05;scheduler()}
function stop(){if(timer)clearTimeout(timer);playing=false;step=0;lastBassFreq=null;el.play.textContent='▶ PLAY';document.querySelectorAll('.playing').forEach(x=>x.classList.remove('playing'))}
function randomizeDrums(){drums=drums.map((row,i)=>row.map((_,s)=>i===0?[0,4,8,12].includes(s)||Math.random()<.08:i===1?[4,12].includes(s)||Math.random()<.06:i===2?Math.random()<.55:Math.random()<.12));syncDrumUI()}
function clearDrumsFn(){drums=drums.map(r=>r.map(()=>false));syncDrumUI()}
function syncDrumUI(){document.querySelectorAll('.rowsteps').forEach((row,i)=>[...row.children].forEach((c,s)=>c.classList.toggle('on',drums[i][s])))}
function randomizeBass(){bass=bass.map(()=>Math.random()<.2?null:Math.floor(Math.random()*notes.length));accents=accents.map(()=>Math.random()<.25);drawBass();syncAccents()}
function clearBassFn(){bass=bass.map(()=>null);accents=accents.map(()=>false);drawBass();syncAccents()}
function syncAccents(){document.querySelectorAll('.accentCell').forEach((c,i)=>{if(i>0)c.classList.toggle('on',accents[i-1])})}
function setOct(v){oct=+v;document.querySelectorAll('.octBtn').forEach(b=>b.classList.toggle('active',+b.dataset.o===oct))}
function renderOffline(){let dur=16*stepDur()*4, sr=44100, off=new OfflineAudioContext(2,Math.ceil(dur*sr),sr);let save={ctx,master,compressor};ctx=off;master=off.createGain();compressor=off.createDynamicsCompressor();compressor.threshold.value=-4;compressor.ratio.value=7;master.gain.value=el.masterVolume.value/100;master.connect(compressor).connect(off.destination);let oldLast=lastBassFreq;lastBassFreq=null;for(let bar=0;bar<4;bar++){for(let s=0;s<16;s++){let t=(bar*16+s)*stepDur();if(s%2===1)t+=(+el.swing.value/100)*stepDur()*.45;drums.forEach((row,i)=>{if(row[s])playDrum(i,t,accents[s])});playBass(t,stepDur(),s)}}lastBassFreq=oldLast;return off.startRendering().then(buf=>{ctx=save.ctx;master=save.master;compressor=save.compressor;return buf}).catch(e=>{ctx=save.ctx;master=save.master;compressor=save.compressor;throw e})}
function wav(buffer){let ch=buffer.numberOfChannels,len=buffer.length*ch*2+44,ab=new ArrayBuffer(len),v=new DataView(ab),o=0;function w(s){for(let i=0;i<s.length;i++)v.setUint8(o++,s.charCodeAt(i))}w('RIFF');v.setUint32(o,len-8,true);o+=4;w('WAVE');w('fmt ');v.setUint32(o,16,true);o+=4;v.setUint16(o,1,true);o+=2;v.setUint16(o,ch,true);o+=2;v.setUint32(o,buffer.sampleRate,true);o+=4;v.setUint32(o,buffer.sampleRate*ch*2,true);o+=4;v.setUint16(o,ch*2,true);o+=2;v.setUint16(o,16,true);o+=2;w('data');v.setUint32(o,len-o-4,true);o+=4;for(let i=0;i<buffer.length;i++)for(let c=0;c<ch;c++){let s=Math.max(-1,Math.min(1,buffer.getChannelData(c)[i]));v.setInt16(o,s<0?s*0x8000:s*0x7fff,true);o+=2}return new Blob([ab],{type:'audio/wav'})}
async function exportWav(){el.export.textContent='RENDER...';try{let buf=await renderOffline();let a=document.createElement('a');a.href=URL.createObjectURL(wav(buf));a.download='acid-303-pattern.wav';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}finally{el.export.textContent='EXPORT WAV'}}
function loadPreset(name){if(name==='Minimal'){drums=drums.map((_,i)=>Array.from({length:16},(_,s)=>i===0&&[0,8].includes(s)||i===1&&[4,12].includes(s)||i===2&&s%4===2));bass=[7,null,7,null,5,null,4,null,7,null,2,null,5,null,4,null];accents=accents.map((_,i)=>[0,8,12].includes(i));}else if(name==='Electro'){drums=drums.map((_,i)=>Array.from({length:16},(_,s)=>i===0&&[0,3,8,10].includes(s)||i===1&&[4,12].includes(s)||i===2&&s%2===0||i===3&&[7,15].includes(s)));bass=[7,7,5,7,2,null,4,5,7,5,2,4,0,null,2,4];accents=accents.map((_,i)=>i%3===0);}else{drums=drumDefs.map((_,i)=>Array.from({length:STEPS},(_,s)=>(i===0&&[0,4,8,12].includes(s))||(i===1&&[4,12].includes(s))||(i===2&&s%2===0)||(i===3&&[8,12].includes(s))||(i===4&&[3,11].includes(s))||(i===5&&[8,15].includes(s))||(i===6&&[5,13].includes(s))||(i===7&&[9,15].includes(s))));bass=[7,6,5,4,3,2,1,0,7,1,5,2,0,null,3,5];accents=Array.from({length:STEPS},(_,i)=>[0,4,8,12].includes(i));}syncDrumUI();drawBass();syncAccents()}

buildUI();document.querySelectorAll('.knob').forEach(k=>{knob(k);k.addEventListener('input',()=>{knob(k);updateLabels()})});updateLabels();
el.play.onclick=()=>playing?stop():start();el.stop.onclick=stop;el.randomDrums.onclick=randomizeDrums;el.clearDrums.onclick=clearDrumsFn;el.randomBass.onclick=randomizeBass;el.clearBass.onclick=clearBassFn;el.slideBtn.onclick=()=>{slide=!slide;el.slideBtn.textContent=slide?'SLIDE ON':'SLIDE OFF';el.slideBtn.classList.toggle('active',slide)};el.masterVolume.oninput=updateLabels;el.export.onclick=exportWav;el.preset.onchange=e=>loadPreset(e.target.value);el.octBtns.addEventListener('click',e=>{let b=e.target.closest('.octBtn');if(b)setOct(b.dataset.o)});
})();
</script>
